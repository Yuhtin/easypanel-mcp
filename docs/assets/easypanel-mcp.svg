<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">easypanel-mcp architecture</title>
  <desc id="desc">An MCP client connects over HTTPS to a read-only Easypanel MCP service, which reads an allowlisted Easypanel project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity=".45"/>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <circle cx="1090" cy="50" r="150" fill="#38bdf8" opacity=".08"/>
  <circle cx="100" cy="340" r="170" fill="#a78bfa" opacity=".08"/>

  <text x="64" y="70" fill="#e0f2fe" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="32" font-weight="700">easypanel-mcp</text>
  <text x="64" y="105" fill="#a5b4fc" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="18">one secure bridge from your agent to Easypanel</text>

  <g filter="url(#shadow)">
    <rect x="64" y="170" width="230" height="112" rx="18" fill="#111827" stroke="#334155"/>
    <rect x="350" y="170" width="230" height="112" rx="18" fill="#111827" stroke="#334155"/>
    <rect x="636" y="170" width="230" height="112" rx="18" fill="#111827" stroke="#334155"/>
    <rect x="922" y="170" width="214" height="112" rx="18" fill="#111827" stroke="#334155"/>
  </g>

  <g fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round">
    <path d="M294 226h56"/>
    <path d="M580 226h56"/>
    <path d="M866 226h56"/>
  </g>
  <g fill="#67e8f9">
    <path d="m342 216 12 10-12 10z"/>
    <path d="m628 216 12 10-12 10z"/>
    <path d="m914 216 12 10-12 10z"/>
  </g>

  <g fill="#f8fafc" font-family="Inter,ui-sans-serif,system-ui,sans-serif" text-anchor="middle">
    <text x="179" y="211" font-size="20" font-weight="700">AI agent</text>
    <text x="179" y="242" fill="#94a3b8" font-size="16">Claude · Cursor · ChatGPT</text>
    <text x="179" y="265" fill="#94a3b8" font-size="14">MCP client</text>

    <text x="465" y="211" font-size="20" font-weight="700">HTTPS /mcp</text>
    <text x="465" y="242" fill="#94a3b8" font-size="16">bearer + origin checks</text>
    <text x="465" y="265" fill="#67e8f9" font-size="14">read-only edge</text>

    <text x="751" y="211" font-size="20" font-weight="700">easypanel-mcp</text>
    <text x="751" y="242" fill="#94a3b8" font-size="16">allowlisted projects</text>
    <text x="751" y="265" fill="#67e8f9" font-size="14">sanitized responses</text>

    <text x="1029" y="211" font-size="20" font-weight="700">Easypanel</text>
    <text x="1029" y="242" fill="#94a3b8" font-size="16">projects · services</text>
    <text x="1029" y="265" fill="#94a3b8" font-size="14">health · deployments</text>
  </g>
</svg>
